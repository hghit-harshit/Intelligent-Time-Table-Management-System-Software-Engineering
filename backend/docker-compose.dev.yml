services:
  mongodb:
    image: mongo:latest
    container_name: timetable-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: timetable
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: timetable-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=5001
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/timetable?authSource=admin
      - GEMINI_API_KEY=AIzaSyCJed26EnDBlOKaocd0rKxZqqovLf1YbmE
      - GEMINI_MODEL=gemini-2.5-flash
      - CORS_ORIGIN=http://localhost:5173
      - ORTOOLS_PYTHON_BIN=python3
    ports:
      - "5001:5001"
    command: sh -c "npm install && npm run dev"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      - mongodb

volumes:
  mongodb_data:
  backend_node_modules:
